# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
# The setup wizard (setup.py) will add the app name when you deploy.

primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  SERVER_HOST = '0.0.0.0'
  SERVER_PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
