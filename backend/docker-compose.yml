version: "3.9"

services:
  claimcall:
    build: .
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    volumes:
      - ./logs:/app/logs
      - /tmp/aic_models:/tmp/aic_models  # AI-Coustics model cache (persist across restarts)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      claimcall:
        condition: service_healthy
