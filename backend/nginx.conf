events {
    worker_connections 1024;
}

http {
    # Docker's internal DNS resolver — resolves service names at request time
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name claimcall.eliteprojects.uk;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name claimcall.eliteprojects.uk;

        ssl_certificate     /etc/letsencrypt/live/claimcall.eliteprojects.uk/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/claimcall.eliteprojects.uk/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Low-latency voice
        proxy_buffering         off;
        proxy_request_buffering off;
        tcp_nodelay             on;

        # ── WebSocket support (required for Twilio Media Streams) ──
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        # ─────────────────────────────────────────────────────────────

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Variable forces runtime DNS resolution (not startup)
        set $upstream http://claimcall:8000;

        location / {
            proxy_pass $upstream;
        }

        location /twilio-stream {
            proxy_pass $upstream;
        }

        location /webhook/ {
            proxy_pass $upstream;
        }
    }
}
